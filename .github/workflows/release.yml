name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: shub-windows-x64
            binary: target/release/shub.exe
            archive: shub-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            artifact: shub-linux-x64
            binary: target/release/shub
            archive: shub-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test
        run: cargo test -p shub

      - name: Build
        run: cargo build --release -p shub

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Package Unix
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive }}" -C target/release shub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  build-cli-macos:
    name: Build CLI macOS universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Test
        run: cargo test --workspace

      - name: Build Intel
        run: cargo build --release -p shub --target x86_64-apple-darwin

      - name: Build Apple Silicon
        run: cargo build --release -p shub --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/shub \
            target/aarch64-apple-darwin/release/shub \
            -output target/universal-apple-darwin/release/shub
          chmod +x target/universal-apple-darwin/release/shub

      - name: Package
        run: tar -czf shub-macos-universal.tar.gz -C target/universal-apple-darwin/release shub

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shub-macos-universal
          path: shub-macos-universal.tar.gz

  build-desktop:
    name: Build desktop ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            artifact: secret-hub-desktop-windows-x64
            archive: secret-hub-desktop-windows-x64.zip
            rust-targets: ""
            build-args: ""
            bundle_dir: apps/desktop/src-tauri/target/release/bundle
          - name: linux-x64
            os: ubuntu-latest
            artifact: secret-hub-desktop-linux-x64
            archive: secret-hub-desktop-linux-x64.tar.gz
            rust-targets: ""
            build-args: ""
            bundle_dir: apps/desktop/src-tauri/target/release/bundle
          - name: macos-universal
            os: macos-latest
            artifact: secret-hub-desktop-macos-universal
            archive: secret-hub-desktop-macos-universal.tar.gz
            rust-targets: x86_64-apple-darwin,aarch64-apple-darwin
            build-args: --target universal-apple-darwin
            bundle_dir: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Test
        run: cargo test --workspace

      - name: Build desktop
        working-directory: apps/desktop
        env:
          CARGO_TARGET_DIR: src-tauri/target
        run: npm run tauri:build -- ${{ matrix.build-args }}

      - name: Package desktop Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.bundle_dir }}/*" -DestinationPath "${{ matrix.archive }}"

      - name: Package desktop Unix
        if: runner.os != 'Windows'
        shell: bash
        run: tar -czf "${{ matrix.archive }}" -C "${{ matrix.bundle_dir }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.archive }}

  release:
    name: Publish GitHub release
    needs:
      - build-cli
      - build-cli-macos
      - build-desktop
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
